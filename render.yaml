services:
  - name: guidewire-gig-ins-backend
    type: web
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: guidewire-gig-ins-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: API_PUBLIC_BASE_URL
        sync: false
      - key: APP_CONFIRM_BASE_URL
        value: gigshield://confirm-email
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: EMAIL_OTP_OPTIONAL_ON_FAILURE
        value: "true"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: BLOCKCHAIN_MODE
        value: mock
      - key: NBFLITE_BASE_URL
        sync: false
      - key: NBFLITE_API_KEY
        sync: false
      - key: NBFLITE_TIMEOUT
        value: "15"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: guidewire-gig-ins-db
    plan: free
    region: singapore
    databaseName: gig_insurance
    postgresMajorVersion: "17"
