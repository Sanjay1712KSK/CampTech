services:
  - name: guidewire-gig-ins-backend
    type: web
    runtime: python
    plan: starter
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: guidewire-gig-ins-db
          property: connectionString
      - key: API_PUBLIC_BASE_URL
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: BLOCKCHAIN_MODE
        value: mock
      - key: NBFLITE_BASE_URL
        sync: false
      - key: NBFLITE_API_KEY
        sync: false
      - key: NBFLITE_TIMEOUT
        value: "15"
      - key: MAILTRAP_TOKEN
        sync: false
      - key: MAILTRAP_SENDER_EMAIL
        value: hello@demomailtrap.co
      - key: MAILTRAP_SENDER_NAME
        value: Mailtrap Test
      - key: MAILTRAP_DEMO_REDIRECT_EMAIL
        value: demo-actors@demomailtrap.co

databases:
  - name: guidewire-gig-ins-db
    plan: free
    region: singapore
    databaseName: gig_insurance
    postgresMajorVersion: "17"

