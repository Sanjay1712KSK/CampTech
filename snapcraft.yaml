name: guidewire-gig-ins
version: "1.0.0"
summary: Real-time, explainable income protection for gig workers
description: |
  GigSHIELD is a Flutter-based gig insurance application that connects
  live environment signals, risk scoring, premium calculation, claims,
  and payout visibility in one explainable experience.

base: core22
confinement: strict
grade: stable

apps:
  guidewire-gig-ins:
    command: guidewire_gig_ins
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - home

parts:
  guidewire-gig-ins:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    build-packages:
      - clang
      - cmake
      - curl
      - git
      - libgtk-3-dev
      - ninja-build
      - pkg-config
    stage-packages:
      - libgtk-3-0
